<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#00a99d"/><stop offset=".55" stop-color="#087ed1"/><stop offset="1" stop-color="#6338ee"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".35"/></filter></defs>
<rect width="1600" height="900" fill="#080b0d"/><rect x="0" y="0" width="1600" height="10" fill="url(#g)"/>
<text x="90" y="105" fill="#fff" font-family="Arial" font-size="48" font-weight="700">A grounded answer, not an AI guess</text>
<text x="90" y="148" fill="#97a4aa" font-family="Arial" font-size="24">Every claim travels through six enforceable trust gates</text>
<g font-family="Arial" filter="url(#s)">
<g transform="translate(80 260)"><rect width="210" height="250" rx="22" fill="#11191c" stroke="#00a99d" stroke-width="3"/><circle cx="105" cy="68" r="32" fill="#00a99d"/><text x="105" y="78" text-anchor="middle" fill="#081113" font-size="28" font-weight="700">1</text><text x="105" y="132" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">QUESTION</text><text x="105" y="175" text-anchor="middle" fill="#98a7ac" font-size="17">English / Kannada</text><text x="105" y="205" text-anchor="middle" fill="#98a7ac" font-size="17">or Kanglish</text></g>
<g transform="translate(325 260)"><rect width="210" height="250" rx="22" fill="#11191c" stroke="#0797b9" stroke-width="3"/><circle cx="105" cy="68" r="32" fill="#0797b9"/><text x="105" y="78" text-anchor="middle" fill="#081113" font-size="28" font-weight="700">2</text><text x="105" y="132" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">INTENT</text><text x="105" y="175" text-anchor="middle" fill="#98a7ac" font-size="17">Validated schema</text><text x="105" y="205" text-anchor="middle" fill="#98a7ac" font-size="17">No free SQL</text></g>
<g transform="translate(570 260)"><rect width="210" height="250" rx="22" fill="#11191c" stroke="#087ed1" stroke-width="3"/><circle cx="105" cy="68" r="32" fill="#087ed1"/><text x="105" y="78" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">3</text><text x="105" y="132" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">SCOPE</text><text x="105" y="175" text-anchor="middle" fill="#98a7ac" font-size="17">Role + jurisdiction</text><text x="105" y="205" text-anchor="middle" fill="#98a7ac" font-size="17">enforced in code</text></g>
<g transform="translate(815 260)"><rect width="210" height="250" rx="22" fill="#11191c" stroke="#2765dd" stroke-width="3"/><circle cx="105" cy="68" r="32" fill="#2765dd"/><text x="105" y="78" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">4</text><text x="105" y="132" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">RETRIEVE</text><text x="105" y="175" text-anchor="middle" fill="#98a7ac" font-size="17">Parameterized</text><text x="105" y="205" text-anchor="middle" fill="#98a7ac" font-size="17">trusted query</text></g>
<g transform="translate(1060 260)"><rect width="210" height="250" rx="22" fill="#11191c" stroke="#464cd8" stroke-width="3"/><circle cx="105" cy="68" r="32" fill="#464cd8"/><text x="105" y="78" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">5</text><text x="105" y="132" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">CITE</text><text x="105" y="175" text-anchor="middle" fill="#98a7ac" font-size="17">Unknown FIR IDs</text><text x="105" y="205" text-anchor="middle" fill="#98a7ac" font-size="17">are rejected</text></g>
<g transform="translate(1305 260)"><rect width="210" height="250" rx="22" fill="#11191c" stroke="#6338ee" stroke-width="3"/><circle cx="105" cy="68" r="32" fill="#6338ee"/><text x="105" y="78" text-anchor="middle" fill="#fff" font-size="28" font-weight="700">6</text><text x="105" y="132" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">AUDIT</text><text x="105" y="175" text-anchor="middle" fill="#98a7ac" font-size="17">Signed hash-chain</text><text x="105" y="205" text-anchor="middle" fill="#98a7ac" font-size="17">for every turn</text></g></g>
<g fill="none" stroke="#66747b" stroke-width="4"><path d="M290 385h35"/><path d="M535 385h35"/><path d="M780 385h35"/><path d="M1025 385h35"/><path d="M1270 385h35"/></g>
<rect x="80" y="625" width="1435" height="130" rx="22" fill="#0e1719" stroke="#253238"/><text x="130" y="685" fill="#fff" font-family="Arial" font-size="30" font-weight="700">NON-NEGOTIABLE BOUNDARY</text><text x="130" y="727" fill="#2fd3b6" font-family="Arial" font-size="25">The LLM classifies intent. It never writes or executes database queries.</text>
