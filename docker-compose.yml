services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: prahari
      POSTGRES_USER: prahari
      POSTGRES_PASSWORD: prahari
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prahari"]
      interval: 5s
      timeout: 3s
      retries: 10
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/prahari-demo
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data]
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://prahari:prahari@postgres:5432/prahari
      NEO4J_URI: bolt://neo4j:7687
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  postgres_data:
  neo4j_data:
